{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-4">Edit Salary Record</h2>
        <form method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Employee Name</label>
                    <input type="text" class="form-control" name="employee_name" value="{{ salary_record.employee_name }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Position</label>
                    <input type="text" class="form-control" name="position" value="{{ salary_record.position }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Department</label>
                    <input type="text" class="form-control" name="department" value="{{ salary_record.department }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Salary</label>
                    <input type="number" step="0.01" class="form-control" name="salary" value="{{ salary_record.salary }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Bonus</label>
                    <input type="number" step="0.01" class="form-control" name="bonus" value="{{ salary_record.bonus }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Status</label>
                    <select class="form-select" name="status" required>
                        <option value="Paid" {% if salary_record.status == 'Paid' %}selected{% endif %}>Paid</option>
                        <option value="Pending" {% if salary_record.status == 'Pending' %}selected{% endif %}>Pending</option>
                        <option value="Review" {% if salary_record.status == 'Review' %}selected{% endif %}>Review</option>
                    </select>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-success">Update Salary Record</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
